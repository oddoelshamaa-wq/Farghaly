<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة فرغلي - روابط الصور</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo'; background: #f0f2f5; padding: 20px; direction: rtl; }
        .container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h2 { color: #d32f2f; text-align: center; }
        input, select { width: 100%; padding: 12px; margin-top: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-family: 'Cairo'; }
        button { width: 100%; padding: 15px; margin-top: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-save { background: #27ae60; color: white; }
        .btn-cat { background: #34495e; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h2>🚀 لوحة تحكم فرغلي (سهلة)</h2>

    <!-- إضافة قسم -->
    <input type="text" id="catName" placeholder="اسم القسم الجديد">
    <button class="btn-cat" id="addCatBtn">إضافة القسم</button>

    <hr style="margin: 20px 0;">

    <!-- إضافة منتج -->
    <input type="text" id="pName" placeholder="اسم العصير">
    <input type="number" id="pPrice" placeholder="السعر">
    <select id="pCat"><option value="">اختر القسم</option></select>
    
    <!-- هنا بنحط رابط الصورة بدل الرفع -->
    <input type="text" id="pImgUrl" placeholder="حط هنا رابط صورة من جوجل">
    <p style="font-size: 11px; color: gray;">* افتح جوجل صور، كليك يمين على الصورة واختار Copy Image Address وحطه هنا.</p>

    <button class="btn-save" id="saveBtn">حفظ في المنيو ✅</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDArRMLPNgFZOcaCYNOtL1YWTIBVtzN638",
        authDomain: "farghaly-4e65b.firebaseapp.com",
        projectId: "farghaly-4e65b",
        storageBucket: "farghaly-4e65b.firebasestorage.app",
        messagingSenderId: "549106402224",
        appId: "1:549106402224:web:3a963a0478e78ce56dcc75"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // إضافة قسم
    document.getElementById('addCatBtn').onclick = async () => {
        const name = document.getElementById('catName').value;
        if(!name) return;
        await addDoc(collection(db, "categories"), { name });
        alert("تم إضافة القسم");
        location.reload();
    };

    // تحميل الأقسام
    const loadCats = async () => {
        const snap = await getDocs(collection(db, "categories"));
        snap.forEach(doc => {
            document.getElementById('pCat').innerHTML += `<option value="${doc.data().name}">${doc.data().name}</option>`;
        });
    };
    loadCats();

    // حفظ المنتج برابط الصورة
    document.getElementById('saveBtn').onclick = async () => {
        const name = document.getElementById('pName').value;
        const price = document.getElementById('pPrice').value;
        const cat = document.getElementById('pCat').value;
        const img = document.getElementById('pImgUrl').value;

        if(!name || !price || !img) return alert("كمل البيانات!");

        try {
            await addDoc(collection(db, "menu"), {
                name, price, category: cat, img, timestamp: Date.now()
            });
            alert("تم الحفظ بنجاح! 🍹");
            location.reload();
        } catch (e) {
            alert("خطأ: " + e.message);
        }
    };
</script>
</body>
</html>
