<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>فرغلي - عالم العصير</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF8C00;
            --secondary: #4CAF50;
            --bg: #F0F2F5;
            --card-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        body { font-family: 'Cairo', sans-serif; background: var(--bg); margin: 0; padding-bottom: 120px; color: #333; }

        /* ستايل شاشة التحميل */
        #loader-screen {
            position: fixed; inset: 0; background: #ffffff; z-index: 99999;
            display: flex; justify-content: center; align-items: center;
            transition: opacity 0.8s ease, visibility 0.8s;
        }
        .loader-content { text-align: center; }
        .logo-wrapper { position: relative; width: 120px; height: 120px; margin: 0 auto 20px; animation: floating3D 2s infinite ease-in-out; }
        .loader-logo { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; box-shadow: 0 20px 40px rgba(0,0,0,0.15); border: 4px solid var(--primary); }
        @keyframes floating3D { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        .loader-text { color: var(--primary); font-weight: 900; margin-top: 15px; }
        .progress-bar-loader { width: 200px; height: 6px; background: #f0f0f0; border-radius: 10px; margin: 20px auto; overflow: hidden; }
        .progress-fill-loader { width: 0%; height: 100%; background: var(--primary); animation: fillProgress 2s forwards; }
        @keyframes fillProgress { to { width: 100%; } }
        
        /* الكود اللي كان ناقص عندك */
        .loader-hidden { opacity: 0 !important; visibility: hidden !important; }

        /* التصميم العام */
        header { background: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .logo-container { display: flex; align-items: center; gap: 10px; }
        .main-logo { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary); }
        .logo-text { font-weight: 900; font-size: 20px; color: var(--primary); }
        .profile-btn { background: var(--bg); padding: 8px 15px; border-radius: 12px; font-size: 12px; font-weight: 700; cursor: pointer; }

        /* رادار التتبع */
        #orderStatusCard { display: none; background: white; margin: 15px; padding: 20px; border-radius: 25px; box-shadow: var(--card-shadow); border-top: 5px solid var(--primary); }
        .status-header { display: flex; justify-content: space-between; align-items: center; }
        .progress-track { display: flex; justify-content: space-between; position: relative; margin: 20px 0; }
        .line { position: absolute; top: 15px; left: 0; right: 0; height: 4px; background: #eee; z-index: 1; }
        .line-active { position: absolute; top: 15px; left: 0; width: 0%; height: 4px; background: var(--secondary); z-index: 2; transition: 1s ease; }
        .step { width: 35px; height: 35px; background: white; border: 3px solid #eee; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 3; font-size: 14px; }
        .step.active { border-color: var(--secondary); background: var(--secondary); color: white; }

        /* المنيو */
        .cats { display: flex; overflow-x: auto; padding: 15px; gap: 10px; scrollbar-width: none; }
        .cat-card { background: white; padding: 10px 20px; border-radius: 15px; font-weight: bold; white-space: nowrap; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .cat-card.active { background: var(--primary); color: white; }
        .items-container { padding: 0 15px; }
        .item-3d { background: white; border-radius: 20px; margin-bottom: 15px; padding: 12px; display: flex; gap: 15px; box-shadow: var(--card-shadow); align-items: center; }
        .img-box { width: 70px; height: 70px; border-radius: 12px; overflow: hidden; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        .add-control { margin-right: auto; }
        .btn-sq { background: var(--primary); color: white; border: none; padding: 8px 15px; border-radius: 10px; font-weight: bold; cursor: pointer; }

        /* سلة عائمة */
        .floating-cart { position: fixed; bottom: 25px; left: 15px; right: 15px; background: var(--primary); padding: 18px; border-radius: 20px; display: none; justify-content: space-between; align-items: center; color: white; font-weight: 900; box-shadow: 0 10px 30px rgba(255, 140, 0, 0.3); z-index: 2000; }

        /* المودال */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); z-index: 3000; align-items: center; justify-content: center; padding: 20px; }
        .modal-body { background: white; width: 100%; max-width: 400px; padding: 25px; border-radius: 25px; }
        input { width: 100%; padding: 15px; margin: 8px 0; border: 1.5px solid #eee; border-radius: 12px; box-sizing: border-box; font-family: 'Cairo'; }
        .confirm-btn { background: var(--secondary); color: white; border: none; width: 100%; padding: 15px; border-radius: 15px; font-weight: 900; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <!-- شاشة التحميل -->
    <div id="loader-screen">
        <div class="loader-content">
            <div class="logo-wrapper">
                <!-- لو مش معاك لوجو استخدم الرابط ده مؤقتاً -->
                <img src="9991132b-0ef0-4c49-841b-1f1ed017ac6c.jpg" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3069/3069324.png'" class="loader-logo">
            </div>
            <h2 class="loader-text">فرغلي.. أصل العصير 🥤</h2>
            <div class="progress-bar-loader">
                <div class="progress-fill-loader"></div>
            </div>
        </div>
    </div>

    <header>
        <div class="logo-container">
            <img src="9991132b-0ef0-4c49-841b-1f1ed017ac6c.jpg" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3069/3069324.png'" class="main-logo">
            <span class="logo-text">فرغلي 🥤</span>
        </div>
        <div class="profile-btn" onclick="openProfile()">🚗 بيانات سيارتي</div>
    </header>

    <div id="orderStatusCard">
        <div class="status-header">
            <div>
                <div id="statusLabel" style="font-weight:900; color:var(--primary); font-size:18px;">قيد الانتظار...</div>
                <div id="orderSummary" style="font-size: 11px; color: #777;">جاري استلام طلبك</div>
            </div>
            <div id="orderIdText" style="font-size:12px; font-weight:bold; background:#fff3e0; padding:5px; border-radius:10px;">#000</div>
        </div>
        <div class="progress-track">
            <div class="line"></div>
            <div id="progressLine" class="line-active"></div>
            <div id="step1" class="step">🕒</div>
            <div id="step2" class="step">🍎</div>
            <div id="step3" class="step">🛵</div>
        </div>
    </div>

    <div class="cats" id="catsList"></div>
    <div class="items-container" id="menuDisplay"></div>

    <div class="floating-cart" id="cartBar" onclick="openCheckout()">
        <span id="cartInfo">0 صنف</span>
        <span>تأكيد الطلب 🚀</span>
        <span id="cartTotal">0 ج.م</span>
    </div>

    <div class="modal" id="formModal">
        <div class="modal-body">
            <h2 id="modalTitle" style="margin-top:0; color: var(--primary);">بيانات السيارة</h2>
            <input type="text" id="carModel" placeholder="نوع السيارة">
            <input type="text" id="carColor" placeholder="لون السيارة">
            <input type="text" id="carPlate" placeholder="رقم اللوحة">
            <input type="tel" id="phone" placeholder="رقم الموبايل">
            <button class="confirm-btn" id="submitBtn">إرسال الطلب</button>
            <button onclick="closeModal()" style="width:100%; background:none; border:none; margin-top:10px; color:gray;">رجوع</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, doc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDArRMLPNgFZOcaCYNOtL1YWTIBVtzN638",
            projectId: "farghaly-4e65b",
            appId: "1:549106402224:web:3a963a0478e78ce56dcc75"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let allItems = [];
        let cart = {};
        let activeOrderID = localStorage.getItem('active_order_id');

        // إخفاء الشاشة بعد التحميل
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loader-screen').classList.add('loader-hidden');
            }, 2000);
        });

        // جلب البيانات
        onSnapshot(collection(db, "categories"), snap => {
            const list = document.getElementById('catsList');
            list.innerHTML = `<div class="cat-card active" onclick="window.filterMenu('الكل', this)">الكل</div>`;
            snap.forEach(d => {
                list.innerHTML += `<div class="cat-card" onclick="window.filterMenu('${d.data().name}', this)">${d.data().name}</div>`;
            });
        });

        onSnapshot(collection(db, "menu"), snap => {
            allItems = [];
            snap.forEach(d => allItems.push({id: d.id, ...d.data()}));
            renderMenu(allItems);
        });

        function renderMenu(data) {
            document.getElementById('menuDisplay').innerHTML = data.map(item => {
                const qty = cart[item.name]?.qty || 0;
                return `
                    <div class="item-3d">
                        <div class="img-box"><img src="${item.img}" onerror="this.src='https://via.placeholder.com/80'"></div>
                        <div class="info">
                            <div style="font-weight:900;">${item.name}</div>
                            <div style="color:var(--secondary); font-weight:bold;">${item.price} ج.م</div>
                        </div>
                        <div class="add-control">
                            <button class="btn-sq" onclick="window.changeQty('${item.name}', 1, ${item.price})">${qty > 0 ? qty + ' +' : 'إضافة +'}</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // تتبع الحالة
        if (activeOrderID) {
            onSnapshot(doc(db, "orders", activeOrderID), (d) => {
                if (d.exists()) {
                    const order = d.data();
                    document.getElementById('orderStatusCard').style.display = 'block';
                    document.getElementById('orderSummary').innerText = order.item;
                    updateTrackerUI(order.status);
                    if (order.status === 'completed') {
                        setTimeout(() => { localStorage.removeItem('active_order_id'); document.getElementById('orderStatusCard').style.display='none'; }, 60000);
                    }
                }
            });
        }

        function updateTrackerUI(status) {
            const line = document.getElementById('progressLine');
            const s1 = document.getElementById('step1'); const s2 = document.getElementById('step2'); const s3 = document.getElementById('step3');
            const label = document.getElementById('statusLabel');
            [s1, s2, s3].forEach(s => s.classList.remove('active'));
            if (status === 'pending') { line.style.width='0%'; s1.classList.add('active'); label.innerText="قيد الانتظار... 🕒"; }
            else if (status === 'preparing') { line.style.width='50%'; s1.classList.add('active'); s2.classList.add('active'); label.innerText="جاري التحضير... 🍎"; }
            else if (status === 'completed') { line.style.width='100%'; s1.classList.add('active'); s2.classList.add('active'); s3.classList.add('active'); label.innerText="وصلنا لعربيتك! ✅"; }
        }

        window.changeQty = (name, delta, price) => {
            if(!cart[name]) cart[name] = {qty:0, price:price};
            cart[name].qty += delta;
            if(cart[name].qty <= 0) delete cart[name];
            let total = 0, count = 0;
            Object.keys(cart).forEach(k => { total += (cart[k].qty * cart[k].price); count += cart[k].qty; });
            document.getElementById('cartBar').style.display = count > 0 ? 'flex' : 'none';
            document.getElementById('cartInfo').innerText = count + " صنف";
            document.getElementById('cartTotal').innerText = total + " ج.م";
            renderMenu(allItems);
        };

        window.filterMenu = (cat, btn) => {
            document.querySelectorAll('.cat-card').forEach(c => c.classList.remove('active'));
            btn.classList.add('active');
            renderMenu(cat === 'الكل' ? allItems : allItems.filter(i => i.category === cat));
        };

        window.openProfile = () => {
            const saved = JSON.parse(localStorage.getItem('farghaly_profile') || '{}');
            document.getElementById('carModel').value = saved.car || '';
            document.getElementById('carColor').value = saved.color || '';
            document.getElementById('carPlate').value = saved.plate || '';
            document.getElementById('phone').value = saved.phone || '';
            document.getElementById('submitBtn').innerText = "حفظ البيانات";
            document.getElementById('submitBtn').onclick = saveProfile;
            document.getElementById('formModal').style.display = 'flex';
        };

        function saveProfile() {
            const p = { car: document.getElementById('carModel').value, color: document.getElementById('carColor').value, plate: document.getElementById('carPlate').value, phone: document.getElementById('phone').value };
            localStorage.setItem('farghaly_profile', JSON.stringify(p));
            alert("تم الحفظ ✅"); closeModal();
        }

        window.openCheckout = () => {
            const saved = JSON.parse(localStorage.getItem('farghaly_profile') || '{}');
            document.getElementById('carModel').value = saved.car || '';
            document.getElementById('carColor').value = saved.color || '';
            document.getElementById('carPlate').value = saved.plate || '';
            document.getElementById('phone').value = saved.phone || '';
            document.getElementById('submitBtn').innerText = activeOrderID ? "تزويد على طلبي +" : "تأكيد الأوردر 🚀";
            document.getElementById('submitBtn').onclick = activeOrderID ? updateOrder : sendOrder;
            document.getElementById('formModal').style.display = 'flex';
        };

        async function sendOrder() {
            const p = { car: document.getElementById('carModel').value, color: document.getElementById('carColor').value, plate: document.getElementById('carPlate').value, phone: document.getElementById('phone').value };
            if(!p.car || !p.phone) return alert("كمل بياناتك!");
            const orderText = Object.keys(cart).map(k => `${k} (x${cart[k].qty})`).join(' + ');
            const docRef = await addDoc(collection(db, "orders"), { ...p, item: orderText, status: "pending", timestamp: Date.now() });
            localStorage.setItem('active_order_id', docRef.id);
            alert("طلبك وصل المطبخ! 🥤");
            location.reload();
        }

        async function updateOrder() {
            const moreItems = Object.keys(cart).map(k => `${k} (x${cart[k].qty})`).join(' + ');
            await updateDoc(doc(db, "orders", activeOrderID), { item: arrayUnion(" [زاد: " + moreItems + "]") });
            alert("تمت الإضافة! ✅"); location.reload();
        }

        window.closeModal = () => document.getElementById('formModal').style.display = 'none';
    </script>
</body>
</html>
